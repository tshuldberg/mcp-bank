name: Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to deploy
        required: true
        type: choice
        default: all
        options:
          - memory-store
          - transform-agent
          - all

jobs:
  deploy-memory-store:
    name: Deploy memory-store
    runs-on: ubuntu-latest
    if: ${{ inputs.service == 'memory-store' || inputs.service == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy memory-store
        working-directory: memory-store
        run: fly deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-transform-agent:
    name: Deploy transform-agent
    runs-on: ubuntu-latest
    if: ${{ inputs.service == 'transform-agent' || inputs.service == 'all' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy transform-agent
        working-directory: transform-agent
        run: fly deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
